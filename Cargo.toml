[package]
name = "litho-book"
version = "0.3.11"
edition = "2024"

description = "Litho Book is a modern web documentation reader specifically designed for the [**Litho (deepwiki-rs)**](https://github.com/sopaco/deepwiki-rs) documentation generation engine. It provides an elegant interface and powerful features that allow you to easily browse and read project architecture documentation generated by Litho."
license = "MIT"
repository = "https://github.com/sopaco/litho-book"

[dependencies]
# CLI framework
clap = { version = "4.5", features = ["derive"] }

# Web service framework
axum = "0.8.4"
tokio = { version = "1.47", features = ["full"] }
tower = { version = "0.5", features = ["util"] }
tower-http = { version = "0.6", features = ["fs", "cors"] }

# Markdown processing
pulldown-cmark = "0.13"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# File system
notify = "8"
walkdir = "2.5"

# Logging
tracing = "0.1"
tracing-subscriber = "0.3"

# Time handling
chrono = { version = "0.4", features = ["serde"] }

# HTTP client (for AI assistant)
reqwest = { version = "0.12", features = ["json", "stream"] }

# Async stream handling
async-stream = "0.3"
futures = "0.3"

# Unix system calls (for privilege checks)
[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
tempfile = "3"
